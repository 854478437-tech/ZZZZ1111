<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenVid AI - 云端满血版大模型</title>
    <style>
        :root {
            --bg: #0a0a12;
            --card-bg: #12121e;
            --border: #2a2a3e;
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --gold: #f59e0b;
            --text: #e8edf5;
            --sub: #94a3b8;
            --success: #4ade80;
            --danger: #ef4444; /* 新增红色，用于余额不足警告 */
            --radius: 18px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(139,92,246,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(245,158,11,0.06) 0%, transparent 60%);
            display: flex; flex-direction: column; align-items: center;
        }
        .navbar {
            width: 100%; max-width: 1200px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 28px; margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px); background: rgba(10,10,18,0.85);
            position: sticky; top: 0; z-index: 100; border-radius: 0 0 24px 24px;
        }
        .logo {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge {
            padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
            background: var(--card-bg); border: 1px solid var(--border); color: var(--sub);
            transition: 0.3s; /* 新增过渡动画 */
        }
        .badge.premium { border-color: var(--gold); color: var(--gold); background: rgba(245,158,11,0.12); }
        /* 新增：余额不足时的红光闪烁动画 */
        .badge.pulse { transform: scale(1.1); border-color: var(--danger); color: var(--danger); box-shadow: 0 0 15px rgba(239,68,68,0.4); }
        
        .btn {
            padding: 8px 18px; border-radius: 20px; font-weight: 600; font-size: 13px;
            cursor: pointer; border: none; transition: 0.2s;
            display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary-light); background: rgba(139,92,246,0.1); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #7c3aed); color: white; }
        .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; font-weight: 700; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }

        .main-container { width: 100%; max-width: 1200px; padding: 0 20px 50px; display: flex; flex-direction: column; gap: 40px; }

        .hero { text-align: center; padding: 50px 0 30px; }
        .hero h1 {
            font-size: clamp(36px, 6vw, 56px); font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #8b5cf6, #fcd34d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .hero .subtitle { font-size: 20px; color: var(--sub); }
        .hero-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-top: 20px; }
        .stat-number { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 14px; color: var(--sub); }

        /* 💡 微调了画廊的间距和悬浮效果，让展示图更高级 */
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
        }
        .gallery-item {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden; transition: 0.3s; position: relative;
        }
        .gallery-item:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(139,92,246,0.2); }
        .gallery-item img, .gallery-item video { width: 100%; display: block; object-fit: cover; height: 220px; }
        .gallery-caption { padding: 12px 16px; font-size: 14px; color: var(--sub); background: rgba(10,10,18,0.85); position: absolute; bottom: 0; width: 100%; font-weight: 600;}

        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .tabs { display: flex; gap: 6px; margin-bottom: 22px; background: var(--bg); border-radius: 14px; padding: 4px; border: 1px solid var(--border); flex-wrap: wrap; }
        .tab {
            flex: 1; text-align: center; padding: 10px; border-radius: 12px; min-width: 120px;
            font-weight: 600; font-size: 14px; cursor: pointer; color: var(--sub); transition: 0.2s;
        }
        .tab.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 💡 新增历史记录网格样式 */
        .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-top: 16px; }
        .history-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .history-card img, .history-card video { width: 100%; height: 160px; object-fit: cover; background: #000; }
        .history-prompt { font-size: 12px; color: var(--sub); padding: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-top: 1px solid var(--border); }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 6px; }
        textarea, input[type="file"] {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px; color: var(--text); font-size: 15px; outline: none;
        }
        textarea:focus { border-color: var(--primary); }
        input[type="file"] { padding: 12px; }
        input[type="file"]::file-selector-button {
            background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-right: 12px;
        }
        .generate-btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; margin-top: 8px; }

        .status-box, .result-box {
            display: none; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center;
        }
        .status-box.active, .result-box.active { display: block; }
        .spinner {
            width: 40px; height: 40px; margin: 0 auto 14px; border: 3px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-wrap { background: var(--bg); border-radius: 20px; height: 8px; overflow: hidden; margin: 12px 0; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 20px; transition: width 0.3s; }
        .result-img { max-width: 100%; border-radius: 12px; margin: 12px 0; }
        .download-link { display: inline-block; padding: 12px 28px; background: var(--primary); color: white; border-radius: 12px; text-decoration: none; font-weight: 700; margin-top: 12px; }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px; width: 90%; max-width: 400px; position: relative;
        }
        .close-btn { position: absolute; top: 12px; right: 18px; background: none; border: none; color: var(--sub); font-size: 24px; cursor: pointer; }
        .modal h3 { margin-bottom: 20px; }
        .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); margin-bottom: 14px; }
        @media (max-width: 640px) {
            .navbar { flex-wrap: wrap; gap: 10px; }
            .hero-stats { gap: 24px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">GenVid AI</div>
    <div class="nav-right" id="navRight"></div>
</nav>

<div class="main-container">
    <div class="hero">

            <div><div class="stat-number">99.7%</div><div class="stat-label">满意度</div></div>

    <!-- 💡 替换了更具视觉冲击力的占位图库 -->
    <div class="gallery">
        <div class="gallery-item">
            <video autoplay loop muted playsinline>
                <source src="https://cdn.pixabay.com/video/2023/08/13/175828-854849058_large.mp4" type="video/mp4">

        </div>
        <div class="gallery-item">

        <div class="gallery-item">

    <div class="card">
        <div class="tabs">
            <div class="tab active" data-tab="text2img">🖼️ 文生图 (120积分)</div>
            <div class="tab" data-tab="img2img">🎨 图生图 (160积分)</div>

            <!-- 💡 新增：历史记录标签卡 -->
            <div class="tab" data-tab="history-tab" onclick="loadHistory()">📂 我的历史记录</div>
        </div>

        <div class="tab-content active" id="text2img">
            <div class="form-group"><label>描述你想要的画面</label><textarea id="t2i-prompt" rows="3" placeholder="例如：中式现代都市街道，超自然气息弥漫，IMAX级画质，超高细节..."></textarea></div>
            <button class="btn btn-primary generate-btn" onclick="generate('text2img')">✨ 生成图片 (消耗 120 积分)</button>
        </div>
        <div class="tab-content" id="img2img">
            <div class="form-group"><label>上传参考图片</label><input type="file" id="i2i-file" accept="image/*"></div>
            <div class="form-group"><label>描述修改方向</label><textarea id="i2i-prompt" rows="2" placeholder="例如：提升材质真实感，增加民俗悬疑光影氛围"></textarea></div>
            <button class="btn btn-primary generate-btn" onclick="generate('img2img')">✨ 生成图片 (消耗 160 积分)</button>
        </div>
        <div class="tab-content" id="text2video">
            <div class="form-group"><label>上传起始图片（可选）</label><input type="file" id="t2v-file" accept="image/*"></div>
            <div class="form-group"><label>描述视频动态</label><textarea id="t2v-prompt" rows="2" placeholder="例如：运镜缓慢推进，火焰与烟雾特效闪烁"></textarea></div>
            <button class="btn btn-primary generate-btn" onclick="generate('text2video')">✨ 生成视频 (消耗 1200 积分)</button>
        </div>

        <!-- 💡 新增：历史记录的内容区 -->
        <div class="tab-content" id="history-tab">
            <p id="history-status" style="font-size: 14px; color: var(--sub);">正在调取您的云端档案...</p>
            <div class="history-grid" id="history-container">
                <!-- 历史数据会渲染到这里 -->
            </div>
        </div>

        <div class="status-box" id="statusBox">
            <div class="spinner"></div>
            <div id="statusText">正在解析提示词...</div>
            <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
            <div id="progressPercent" style="font-size:13px; color:var(--sub);">0%</div>
        </div>
        <div class="result-box" id="resultBox">
            <div style="font-size:24px;">✅</div>
            <div style="font-weight:700; color:var(--success);">生成成功！</div>
            <img id="resultImage" class="result-img" src="" style="display:none;">
            <video id="resultVideo" controls style="max-width:100%; border-radius:12px; display:none; margin:12px 0;" src=""></video>
            <br><a href="#" class="download-link" id="downloadLink" target="_blank">📥 下载原作品</a>
        </div>
    </div>
</div>

<!-- 登录/注册弹窗 -->
<div class="modal-overlay" id="authModal">
    <div class="modal">
        <button class="close-btn" onclick="closeModal('authModal')">&times;</button>
        <h3 id="authTitle">登录</h3>
        <input type="email" id="authEmail" placeholder="邮箱地址">
        <input type="password" id="authPassword" placeholder="密码">
        <button class="btn btn-primary" id="authSubmitBtn" style="width:100%;">登录</button>
        <p style="text-align:center; margin-top:14px; font-size:13px; color:var(--sub);">
            <span id="authToggleText">没有账号？</span> <a href="#" id="authToggleLink" style="color:var(--primary-light);">立即注册</a>
        </p>
    </div>
</div>

<!-- 会员/充值弹窗 -->
<div class="modal-overlay" id="memberModal"><div class="modal"><button class="close-btn" onclick="closeModal('memberModal')">&times;</button><h3>🔥 开通会员</h3><p style="color:var(--sub); margin-bottom:16px;">即将上线，敬请期待</p></div></div>
<div class="modal-overlay" id="rechargeModal"><div class="modal"><button class="close-btn" onclick="closeModal('rechargeModal')">&times;</button><h3>⚡ 充值积分</h3><p style="color:var(--sub); margin-bottom:16px;">即将上线，敬请期待</p></div></div>

<script>
    const BASE_URL = 'https://bzeyydwvbowjjyqerjws.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZXl5ZHd2Ym93amp5cWVyandzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjczMzksImV4cCI6MjA5ODY0MzMzOX0.7KUkg3VTFzEJcZaH4dmDDms5Ge2_Gme2-AB5MIYzIsY';
    
    let currentToken = null;
    let userPoints = 0; // 💡 新增：全局追踪积分，实现前端秒扣

    async function init() {
        const token = localStorage.getItem('auth_token');
        if (token) {
            const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) currentToken = token;
            else localStorage.removeItem('auth_token');
        }
        updateNav();
    }

    async function updateNav() {
        const nav = document.getElementById('navRight');
        if (!currentToken) {
            nav.innerHTML = `
                <button class="btn btn-outline" onclick="openAuth('login')">登录</button>
                <button class="btn btn-primary" onclick="openAuth('register')">注册</button>
            `;
            return;
        }
        const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${currentToken}` } });
        if (!res.ok) { logout(); return; }
        
        const profile = await res.json();
        userPoints = profile.points; // 💡 每次获取信息，同步最新积分
        const isMember = profile.membership !== 'free';
        const memberName = isMember ? profile.membership : '免费用户';
        const badgeClass = isMember ? 'premium' : '';
        
        // 💡 重点：给积分 badge 加上 id="pointsBadge"，方便后续做动画和秒更新
        let html = `<span class="badge ${badgeClass}" id="pointsBadge">💰 ${userPoints} 积分</span>
                    <span class="badge ${badgeClass}">👤 ${memberName}</span>`;
        if (!isMember) html += `<button class="btn btn-gold btn-sm" onclick="openMember()">开通会员</button>`;
        else html += `<button class="btn btn-gold btn-sm" onclick="openRecharge()">充值积分</button> <button class="btn btn-outline btn-sm" onclick="openMember()">续费/升级</button>`;
        html += `<button class="btn btn-outline btn-sm" onclick="logout()">退出</button>`;
        nav.innerHTML = html;
    }

    function logout() { currentToken = null; localStorage.removeItem('auth_token'); updateNav(); alert('已退出登录'); }

    // 登录注册部分原样保留
    let authMode = 'login';
    function openAuth(mode) { authMode = mode; document.getElementById('authTitle').textContent = mode === 'login' ? '登录' : '注册'; document.getElementById('authSubmitBtn').textContent = mode === 'login' ? '登录' : '注册'; document.getElementById('authToggleText').textContent = mode === 'login' ? '没有账号？' : '已有账号？'; document.getElementById('authToggleLink').textContent = mode === 'login' ? '立即注册' : '去登录'; document.getElementById('authModal').classList.add('active'); document.getElementById('authEmail').value = ''; document.getElementById('authPassword').value = ''; }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    document.getElementById('authToggleLink').addEventListener('click', e => { e.preventDefault(); openAuth(authMode === 'login' ? 'register' : 'login'); });
    
    document.getElementById('authSubmitBtn').addEventListener('click', async () => {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        if (!email || !password) return alert('请填写完整');
        const endpoint = authMode === 'login' ? '/api/login' : '/api/register';
        const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (!res.ok) return alert('操作失败：' + data.error);
        currentToken = data.token; localStorage.setItem('auth_token', data.token);
        alert(authMode === 'login' ? '登录成功！' : '注册成功！已自动登录，赠送200积分已到账');
        closeModal('authModal'); updateNav();
    });

    function openMember() { if(!currentToken) return alert('请先登录'); document.getElementById('memberModal').classList.add('active'); }
    function openRecharge() { if(!currentToken) return alert('请先登录'); document.getElementById('rechargeModal').classList.add('active'); }
    document.querySelectorAll('.modal-overlay').forEach(o => { o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); }); });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.tab).classList.add('active');
            document.getElementById('statusBox').classList.remove('active');
            document.getElementById('resultBox').classList.remove('active');
        });
    });

    const COST = { text2img: 120, img2img: 160, text2video: 1200 };
    
    // ========== 💡 核心修改：生成、拦截与扣费逻辑 ==========
    async function generate(mode) {
        if (!currentToken) return alert('请先登录');
        const cost = COST[mode];

        // 🛑 第一层拦截：前端算账。如果钱不够，报警并闪烁红灯！
        if (userPoints < cost) {
            const badge = document.getElementById('pointsBadge');
            badge.classList.add('pulse'); // 开启红光闪烁动画
            setTimeout(() => badge.classList.remove('pulse'), 600); // 0.6秒后恢复
            return alert(`余额不足 😭！本次生成需要消耗 ${cost} 积分，您当前仅剩 ${userPoints} 积分。请充值。`);
        }

        const promptInput = document.getElementById(mode === 'text2img' ? 't2i-prompt' : (mode === 'img2img' ? 'i2i-prompt' : 't2v-prompt'));
        if (!promptInput.value.trim()) return alert('请输入您想要的画面描述');

        // 提交订单
        const res = await fetch('/api/submit-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentToken}` },
            body: JSON.stringify({ mode, prompt: promptInput.value.trim() })
        });
        
        const result = await res.json();
        if (!res.ok) return alert('排单失败：' + result.error);

        // 💰 订单提交成功，无需刷新网页，直接在右上角秒扣积分，给用户即时反馈！
        if (result.remaining_points !== undefined) {
            userPoints = result.remaining_points;
            document.getElementById('pointsBadge').innerText = `💰 ${userPoints} 积分`;
        }

        const statusBox = document.getElementById('statusBox');
        const resultBox = document.getElementById('resultBox');
        statusBox.classList.add('active'); resultBox.classList.remove('active');
        
        document.getElementById('statusText').innerText = '🔄 订单已分配至高端算力节点，正在全力渲染中...';
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('progressPercent').innerText = '排单中';

        // 轮询逻辑完全保留你之前跑通的代码！
        const interval = setInterval(async () => {
            const checkRes = await fetch('/api/check-order?t=' + new Date().getTime(), {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const data = await checkRes.json();

            const finalUrl = data.image_url || data.video_url;

            if (data.status === 'completed' && finalUrl) {
                clearInterval(interval); 
                statusBox.classList.remove('active');
                resultBox.classList.add('active');

                const img = document.getElementById('resultImage');
                const vid = document.getElementById('resultVideo');
                const link = document.getElementById('downloadLink');
                img.style.display = 'none'; vid.style.display = 'none';

                if (data.video_url || finalUrl.endsWith('.mp4')) {
                    vid.style.display = 'block';
                    vid.src = finalUrl;
                    link.href = finalUrl;
                } else {
                    img.style.display = 'block';
                    img.src = finalUrl;
                    link.href = finalUrl;
                }
                document.getElementById('statusText').innerText = '✅ 制作完成！';
            }
        }, 5000); 
    }

    // ========== 💡 新增功能：加载历史记录 ==========
    async function loadHistory() {
        if (!currentToken) {
            document.getElementById('history-status').innerText = '请先登录以查看历史档案。';
            return;
        }
        
        document.getElementById('history-status').innerText = '正在调取您的云端档案...';
        const res = await fetch('/api/history?t=' + new Date().getTime(), {
            headers: { 'Authorization': `Bearer ${currentToken}` }
        });
        
        if (!res.ok) {
            document.getElementById('history-status').innerText = '获取失败，请稍后再试。';
            return;
        }
        
        const orders = await res.json();
        const container = document.getElementById('history-container');
        container.innerHTML = ''; 
        
        if (orders.length === 0) {
            document.getElementById('history-status').innerText = '您还没有生成过任何作品，快去尝试一下吧！';
            return;
        }
        
        document.getElementById('history-status').innerText = `已为您找到 ${orders.length} 条生成记录。`;
        
        orders.forEach(order => {
            const finalUrl = order.image_url || order.video_url;
            if (!finalUrl) return; 

            const card = document.createElement('div');
            card.className = 'history-card';
            
            let mediaHtml = (order.video_url || finalUrl.endsWith('.mp4')) 
                ? `<video src="${finalUrl}" controls></video>` 
                : `<img src="${finalUrl}" alt="历史作品">`;
            
            card.innerHTML = `
                ${mediaHtml}
                <div class="history-prompt">📝 ${order.prompt || '未命名指令'}</div>
            `;
            container.appendChild(card);
        });
    }

    init();
</script>
